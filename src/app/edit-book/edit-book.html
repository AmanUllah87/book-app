<div class="content">
  <h1 #h1tag>Edit Book</h1>
  <button (click)="checkH1(h1tag)">Check H1</button>

  <form #form="ngForm"  (ngSubmit)="saveBook(form)" >
    
    <section #section>
      
      <nav>Book Info</nav>
      <div>
        <input placeholder="Book Name" [(ngModel)]="book.name" name="name"/>
        <div>
          <!-- {{book.name}} -->
        </div>
        <input placeholder="Author" [(ngModel)]="book.author" name="author" />
        <input type="date" placeholder="Published Date" [(ngModel)]="book.publishedYear" name="publishedYear" />
        <input type="number" placeholder="Rating (1-5)" [(ngModel)]="book.rating" name="rating"/>
      </div>
    </section>

    <section ngModelGroup="publisher">
      <nav>Publisher</nav>
      <div>
        <input placeholder="Publisher Name" [(ngModel)]="book.publisher.publisherName" name="publisherName" />
        <div class="radio">
          <label><input type="radio" value="traditional" [(ngModel)]="book.publisher.publisherType" name="publisherType" /> Traditional</label>
          <label><input type="radio" value="self-published" [(ngModel)]="book.publisher.publisherType" name="publisherType" /> Self-Published</label>
          <label><input type="radio" value="academic" [(ngModel)]="book.publisher.publisherType" name="publisherType" /> Academic</label>
        </div>
      </div>
    </section>

    <section>
      <nav>Category</nav>
      <div>
        <select [(ngModel)]="book.category" name="category">
          <option value="" >-- Select Category --</option>
          <option value="Programming">Programming</option>
          <option value="Algorithms">Algorithms</option>
          <option value="System Design">System Design</option>
          <option value="Software Engineering">Software Engineering</option>
        </select>
        <textarea placeholder="Description" [(ngModel)]="book.description" name="description"></textarea>
      </div>
    </section>

    <div class="buttons">
    <button class="secondary" routerLink="/books">Cancel</button>
    <button type="submit" [disabled]="form.submitted">Save</button>
  </div>
  </form>

</div>
